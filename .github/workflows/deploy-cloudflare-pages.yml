name: Deploy Cloudflare Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      cloudflare_branch:
        description: "Cloudflare Pages branch metadata"
        default: "main"
        required: true
        type: string

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: false

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'rezics-about' }}
  CLOUDFLARE_PAGES_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.cloudflare_branch || 'main' }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: task test

      - name: Build
        run: task build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          wranglerVersion: "4"
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ env.CLOUDFLARE_PAGES_BRANCH }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
